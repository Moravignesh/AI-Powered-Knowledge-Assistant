version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: ai_knowledge_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ai_knowledge_db
      MYSQL_USER: ai_user
      MYSQL_PASSWORD: ai_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_knowledge_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://ai_user:ai_password@mysql:3306/ai_knowledge_db
      SECRET_KEY: change-this-secret-key-in-production-32chars
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHROMA_PERSIST_DIR: /app/chroma_db
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - backend_uploads:/app/uploads
      - backend_chroma:/app/chroma_db
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: ai_knowledge_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
  backend_chroma:
